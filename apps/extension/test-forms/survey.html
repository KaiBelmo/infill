<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Survey</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; padding: 2rem; color: #1a1a1a; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
    fieldset { border: 1px solid #ddd; border-radius: 8px; padding: 1.25rem; margin-bottom: 1.25rem; background: #fff; }
    legend { font-weight: 600; font-size: 0.95rem; padding: 0 0.5rem; color: #333; }
    .row { display: flex; gap: 1rem; margin-bottom: 0.75rem; }
    .row > * { flex: 1; }
    label { display: block; font-size: 0.8rem; font-weight: 500; margin-bottom: 0.25rem; color: #444; }
    input, select, textarea { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #ccc; border-radius: 6px; font-size: 0.9rem; }
    .checkbox-row, .radio-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
    .checkbox-row input, .radio-row input { width: auto; }
    .submit-row { text-align: center; margin-top: 1rem; }
    button[type="submit"] { padding: 0.65rem 2.5rem; font-size: 1rem; font-weight: 600; color: #fff; background: #2563eb; border: none; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
<h1>Customer Satisfaction Survey</h1>
<form id="survey-form" autocomplete="off">
  <fieldset>
    <legend>Contact Info</legend>
    <div class="row">
      <div>
        <label for="full-name">Full Name</label>
        <input type="text" id="full-name" name="fullName" placeholder="John Doe">
      </div>
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="john@example.com">
      </div>
    </div>
  </fieldset>
  <fieldset>
    <legend>Experience Rating</legend>
    <p style="margin-bottom:0.5rem;font-size:0.85rem">How would you rate our service?</p>
    <div class="radio-row">
      <input type="radio" id="rating-1" name="rating" value="1">
      <label for="rating-1" style="margin-bottom:0">1 - Poor</label>
    </div>
    <div class="radio-row">
      <input type="radio" id="rating-2" name="rating" value="2">
      <label for="rating-2" style="margin-bottom:0">2 - Fair</label>
    </div>
    <div class="radio-row">
      <input type="radio" id="rating-3" name="rating" value="3">
      <label for="rating-3" style="margin-bottom:0">3 - Good</label>
    </div>
    <div class="radio-row">
      <input type="radio" id="rating-4" name="rating" value="4">
      <label for="rating-4" style="margin-bottom:0">4 - Very Good</label>
    </div>
    <div class="radio-row">
      <input type="radio" id="rating-5" name="rating" value="5">
      <label for="rating-5" style="margin-bottom:0">5 - Excellent</label>
    </div>
  </fieldset>
  <fieldset>
    <legend>Interests</legend>
    <p style="margin-bottom:0.5rem;font-size:0.85rem">Which features interest you? (select all)</p>
    <div class="checkbox-row">
      <input type="checkbox" id="interest-product" name="interests" value="product">
      <label for="interest-product" style="margin-bottom:0">Product Quality</label>
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="interest-price" name="interests" value="price">
      <label for="interest-price" style="margin-bottom:0">Pricing</label>
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="interest-support" name="interests" value="support">
      <label for="interest-support" style="margin-bottom:0">Customer Support</label>
    </div>
  </fieldset>
  <fieldset>
    <legend>Additional Comments</legend>
    <label for="comments">Comments</label>
    <textarea id="comments" name="comments" placeholder="Tell us more..."></textarea>
  </fieldset>
  <div class="submit-row">
    <button type="submit">Submit Survey</button>
  </div>
</form>
<script>
  document.getElementById('survey-form').addEventListener('submit', function(e) {
    e.preventDefault();
    window.__formSubmitted = true;
  });
</script>
</body>
</html>
