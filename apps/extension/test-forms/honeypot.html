<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newsletter Signup</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; padding: 2rem; color: #1a1a1a; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
    fieldset { border: 1px solid #ddd; border-radius: 8px; padding: 1.25rem; margin-bottom: 1.25rem; background: #fff; }
    legend { font-weight: 600; font-size: 0.95rem; padding: 0 0.5rem; color: #333; }
    .row { display: flex; gap: 1rem; margin-bottom: 0.75rem; }
    .row > * { flex: 1; }
    label { display: block; font-size: 0.8rem; font-weight: 500; margin-bottom: 0.25rem; color: #444; }
    input { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #ccc; border-radius: 6px; font-size: 0.9rem; }
    .submit-row { text-align: center; margin-top: 1rem; }
    button[type="submit"] { padding: 0.65rem 2.5rem; font-size: 1rem; font-weight: 600; color: #fff; background: #2563eb; border: none; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
<h1>Newsletter Signup</h1>
<form id="honeypot-form" autocomplete="off">
  <fieldset>
    <legend>Your Info</legend>
    <div class="row">
      <div>
        <label for="first-name">First Name</label>
        <input type="text" id="first-name" name="firstName" placeholder="John">
      </div>
      <div>
        <label for="last-name">Last Name</label>
        <input type="text" id="last-name" name="lastName" placeholder="Doe">
      </div>
    </div>
    <div class="row">
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="john@example.com">
      </div>
    </div>
  </fieldset>
  <!-- Honeypot fields: hidden from real users, bots fill them -->
  <div style="position:absolute;left:-9999px;top:-9999px;opacity:0;height:0;overflow:hidden">
    <label for="website">Website</label>
    <input type="text" id="website" name="website" tabindex="-1" autocomplete="off">
    <label for="fax">Fax Number</label>
    <input type="text" id="fax" name="fax" tabindex="-1" autocomplete="off">
  </div>
  <!-- Another honeypot using display:none -->
  <div style="display:none">
    <label for="company_name">Company Name</label>
    <input type="text" id="company_name" name="company_name" tabindex="-1">
  </div>
  <div class="submit-row">
    <button type="submit">Subscribe</button>
  </div>
</form>
<script>
  document.getElementById('honeypot-form').addEventListener('submit', function(e) {
    e.preventDefault();
    window.__formSubmitted = true;
  });
</script>
</body>
</html>
