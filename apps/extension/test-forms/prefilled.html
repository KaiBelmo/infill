<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update Profile</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; padding: 2rem; color: #1a1a1a; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
    fieldset { border: 1px solid #ddd; border-radius: 8px; padding: 1.25rem; margin-bottom: 1.25rem; background: #fff; }
    legend { font-weight: 600; font-size: 0.95rem; padding: 0 0.5rem; color: #333; }
    .row { display: flex; gap: 1rem; margin-bottom: 0.75rem; }
    .row > * { flex: 1; }
    label { display: block; font-size: 0.8rem; font-weight: 500; margin-bottom: 0.25rem; color: #444; }
    input, select { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #ccc; border-radius: 6px; font-size: 0.9rem; }
    .submit-row { text-align: center; margin-top: 1rem; }
    button[type="submit"] { padding: 0.65rem 2.5rem; font-size: 1rem; font-weight: 600; color: #fff; background: #2563eb; border: none; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
<h1>Update Your Profile</h1>
<form id="prefilled-form" autocomplete="off">
  <fieldset>
    <legend>Personal Information</legend>
    <div class="row">
      <div>
        <label for="first-name">First Name</label>
        <input type="text" id="first-name" name="firstName" value="Alice">
      </div>
      <div>
        <label for="last-name">Last Name</label>
        <input type="text" id="last-name" name="lastName" value="Smith">
      </div>
    </div>
    <div class="row">
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="alice.smith@company.com">
      </div>
      <div>
        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone" value="(555) 987-6543">
      </div>
    </div>
  </fieldset>
  <fieldset>
    <legend>Address</legend>
    <div class="row">
      <div>
        <label for="city">City</label>
        <input type="text" id="city" name="city" value="Denver">
      </div>
      <div>
        <label for="state">State</label>
        <select id="state" name="state">
          <option value="">Select...</option>
          <option value="AZ">Arizona</option>
          <option value="CA">California</option>
          <option value="CO" selected>Colorado</option>
          <option value="NY">New York</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div>
        <label for="company">Company</label>
        <input type="text" id="company" name="company" value="TechCorp">
      </div>
      <div>
        <label for="job-title">Job Title</label>
        <input type="text" id="job-title" name="jobTitle" value="Senior Engineer">
      </div>
    </div>
  </fieldset>
  <div class="submit-row">
    <button type="submit">Update Profile</button>
  </div>
</form>
<script>
  document.getElementById('prefilled-form').addEventListener('submit', function(e) {
    e.preventDefault();
    window.__formSubmitted = true;
  });
</script>
</body>
</html>
