<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Address Form</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; padding: 2rem; color: #1a1a1a; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
    fieldset { border: 1px solid #ddd; border-radius: 8px; padding: 1.25rem; margin-bottom: 1.25rem; background: #fff; }
    legend { font-weight: 600; font-size: 0.95rem; padding: 0 0.5rem; color: #333; }
    .row { display: flex; gap: 1rem; margin-bottom: 0.75rem; }
    .row > * { flex: 1; }
    label { display: block; font-size: 0.8rem; font-weight: 500; margin-bottom: 0.25rem; color: #444; }
    input, select { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #ccc; border-radius: 6px; font-size: 0.9rem; }
    .submit-row { text-align: center; margin-top: 1rem; }
    button[type="submit"] { padding: 0.65rem 2.5rem; font-size: 1rem; font-weight: 600; color: #fff; background: #2563eb; border: none; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
<h1>Shipping Address</h1>
<form id="address-form" autocomplete="off">
  <fieldset>
    <legend>Mailing Address</legend>
    <div class="row">
      <div style="flex:2">
        <label for="street">Street Address</label>
        <input type="text" id="street" name="street" placeholder="123 Main St">
      </div>
      <div style="flex:1">
        <label for="apt">Apt / Suite</label>
        <input type="text" id="apt" name="apt" placeholder="#4B">
      </div>
    </div>
    <div class="row">
      <div>
        <label for="city">City</label>
        <input type="text" id="city" name="city" placeholder="Phoenix">
      </div>
      <div>
        <label for="state">State</label>
        <select id="state" name="state">
          <option value="">Select...</option>
          <option value="AZ">Arizona</option>
          <option value="CA">California</option>
          <option value="NY">New York</option>
          <option value="TX">Texas</option>
        </select>
      </div>
      <div>
        <label for="zip">Zip Code</label>
        <input type="text" id="zip" name="zip" placeholder="85001">
      </div>
    </div>
    <div class="row">
      <div>
        <label for="country">Country</label>
        <select id="country" name="country">
          <option value="US">United States</option>
          <option value="CA">Canada</option>
        </select>
      </div>
    </div>
  </fieldset>
  <div class="submit-row">
    <button type="submit">Save Address</button>
  </div>
</form>
<script>
  document.getElementById('address-form').addEventListener('submit', function(e) {
    e.preventDefault();
    window.__formSubmitted = true;
  });
</script>
</body>
</html>
