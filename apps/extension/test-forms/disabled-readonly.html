<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Disabled & Readonly Form</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; padding: 2rem; color: #1a1a1a; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
    fieldset { border: 1px solid #ddd; border-radius: 8px; padding: 1.25rem; margin-bottom: 1.25rem; background: #fff; }
    legend { font-weight: 600; font-size: 0.95rem; padding: 0 0.5rem; color: #333; }
    .row { display: flex; gap: 1rem; margin-bottom: 0.75rem; }
    .row > * { flex: 1; }
    label { display: block; font-size: 0.8rem; font-weight: 500; margin-bottom: 0.25rem; color: #444; }
    input, select, textarea { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #ccc; border-radius: 6px; font-size: 0.9rem; }
    input:disabled, select:disabled, textarea:disabled { background: #eee; color: #888; }
    input[readonly] { background: #f0f0f0; color: #666; }
    input[type="hidden"] { display: none; }
    .submit-row { text-align: center; margin-top: 1rem; }
    button[type="submit"] { padding: 0.65rem 2.5rem; font-size: 1rem; font-weight: 600; color: #fff; background: #2563eb; border: none; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
<h1>Account Settings</h1>
<form id="disabled-readonly-form" autocomplete="off">
  <fieldset>
    <legend>Editable Fields</legend>
    <div class="row">
      <div>
        <label for="first-name">First Name</label>
        <input type="text" id="first-name" name="firstName" placeholder="John">
      </div>
      <div>
        <label for="last-name">Last Name</label>
        <input type="text" id="last-name" name="lastName" placeholder="Doe">
      </div>
    </div>
    <div class="row">
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="john@example.com">
      </div>
      <div>
        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone" placeholder="(555) 123-4567">
      </div>
    </div>
  </fieldset>
  <fieldset>
    <legend>Read-Only Fields</legend>
    <div class="row">
      <div>
        <label for="account-id">Account ID</label>
        <input type="text" id="account-id" name="accountId" value="ACC-12345" readonly>
      </div>
      <div>
        <label for="created-at">Created At</label>
        <input type="text" id="created-at" name="createdAt" value="2024-01-15" readonly>
      </div>
    </div>
  </fieldset>
  <fieldset>
    <legend>Disabled Fields</legend>
    <div class="row">
      <div>
        <label for="locked-email">Locked Email</label>
        <input type="email" id="locked-email" name="lockedEmail" value="admin@company.com" disabled>
      </div>
      <div>
        <label for="locked-role">Role</label>
        <input type="text" id="locked-role" name="lockedRole" value="Administrator" disabled>
      </div>
    </div>
  </fieldset>
  <!-- Hidden fields (not visible to user) -->
  <input type="hidden" id="csrf-token" name="csrfToken" value="abc123secret">
  <input type="hidden" id="internal-id" name="internalId" value="secret-internal-999">
  <div class="submit-row">
    <button type="submit">Save Settings</button>
  </div>
</form>
<script>
  document.getElementById('disabled-readonly-form').addEventListener('submit', function(e) {
    e.preventDefault();
    window.__formSubmitted = true;
  });
</script>
</body>
</html>
