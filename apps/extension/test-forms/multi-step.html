<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Step Registration</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; padding: 2rem; color: #1a1a1a; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .step-indicator { font-size: 0.85rem; color: #666; margin-bottom: 1.5rem; }
    .step { display: none; border: 1px solid #ddd; border-radius: 8px; padding: 1.25rem; margin-bottom: 1.25rem; background: #fff; }
    .step.active { display: block; }
    .row { display: flex; gap: 1rem; margin-bottom: 0.75rem; }
    .row > * { flex: 1; }
    label { display: block; font-size: 0.8rem; font-weight: 500; margin-bottom: 0.25rem; color: #444; }
    input, select { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #ccc; border-radius: 6px; font-size: 0.9rem; }
    .nav-row { display: flex; gap: 1rem; justify-content: space-between; margin-top: 1rem; }
    button { padding: 0.65rem 2rem; font-size: 1rem; font-weight: 600; border: none; border-radius: 6px; cursor: pointer; }
    .btn-prev { background: #e5e7eb; color: #333; }
    .btn-next { background: #2563eb; color: #fff; }
  </style>
</head>
<body>
<h1>Event Registration</h1>
<p class="step-indicator">Step <span id="step-num">1</span> of 3</p>
<form id="multi-step-form" autocomplete="off">
  <!-- Step 1: Personal -->
  <div class="step active" id="step-1">
    <div class="row">
      <div>
        <label for="first-name">First Name</label>
        <input type="text" id="first-name" name="firstName" placeholder="John">
      </div>
      <div>
        <label for="last-name">Last Name</label>
        <input type="text" id="last-name" name="lastName" placeholder="Doe">
      </div>
    </div>
    <div class="row">
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="john@example.com">
      </div>
      <div>
        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone" placeholder="(555) 123-4567">
      </div>
    </div>
    <div class="nav-row">
      <div></div>
      <button type="button" class="btn-next" onclick="goStep(2)">Next</button>
    </div>
  </div>
  <!-- Step 2: Address -->
  <div class="step" id="step-2">
    <div class="row">
      <div style="flex:2">
        <label for="street">Street</label>
        <input type="text" id="street" name="street" placeholder="123 Main St">
      </div>
      <div style="flex:1">
        <label for="city">City</label>
        <input type="text" id="city" name="city" placeholder="Phoenix">
      </div>
    </div>
    <div class="row">
      <div>
        <label for="state">State</label>
        <select id="state" name="state">
          <option value="">Select...</option>
          <option value="AZ">Arizona</option>
          <option value="CA">California</option>
          <option value="NY">New York</option>
        </select>
      </div>
      <div>
        <label for="zip">Zip</label>
        <input type="text" id="zip" name="zip" placeholder="85001">
      </div>
    </div>
    <div class="nav-row">
      <button type="button" class="btn-prev" onclick="goStep(1)">Previous</button>
      <button type="button" class="btn-next" onclick="goStep(3)">Next</button>
    </div>
  </div>
  <!-- Step 3: Preferences -->
  <div class="step" id="step-3">
    <div class="row">
      <div>
        <label for="company">Company</label>
        <input type="text" id="company" name="company" placeholder="Acme Inc">
      </div>
      <div>
        <label for="job-title">Job Title</label>
        <input type="text" id="job-title" name="jobTitle" placeholder="Engineer">
      </div>
    </div>
    <div class="nav-row">
      <button type="button" class="btn-prev" onclick="goStep(2)">Previous</button>
      <button type="submit" class="btn-next">Submit Registration</button>
    </div>
  </div>
</form>
<script>
  function goStep(n) {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById('step-' + n).classList.add('active');
    document.getElementById('step-num').textContent = n;
  }
  document.getElementById('multi-step-form').addEventListener('submit', function(e) {
    e.preventDefault();
    window.__formSubmitted = true;
  });
</script>
</body>
</html>
